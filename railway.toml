# Railway config-as-code for iag-fleet (repo root = service root).
# https://docs.railway.com/config-as-code/reference

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
# Final Dockerfile stage is `standalone` (clones Fleet_IoT). Monorepo Compose uses --target monorepo.

[deploy]
healthcheckPath = "/ready"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Railway probes the PORT variable (not ADDR). Keep PORT=4008 in service variables
# or rely on Dockerfile ENV PORT=4008 so healthchecks hit the API listener.
